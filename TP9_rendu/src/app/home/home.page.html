<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Atelier Cuisine</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid>
    <ion-row>
      @for (item of recettes(); track item.nom) {
        <ion-col size="12" size-md="6" size-lg="4">
          <app-recette [recette]="item"></app-recette>
        </ion-col>
      }
    </ion-row>
  </ion-grid>
</ion-content>
